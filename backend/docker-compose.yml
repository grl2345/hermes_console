services:
  hermes-backend:
    build: .
    image: hermes-console-backend:0.1.0
    container_name: hermes-console-backend
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      PORT: 8080
      DOCKER_HOST: unix:///var/run/docker.sock
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      API_KEY: ${API_KEY:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@hermes.ai}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_NAME: ${ADMIN_NAME:-Administrator}
      TOKEN_TTL_HOURS: ${TOKEN_TTL_HOURS:-168}
      HERMES_LABEL_KEY: ${HERMES_LABEL_KEY-hermes.agent}
      HERMES_LABEL_VALUE: ${HERMES_LABEL_VALUE-true}
      HERMES_NAME_PREFIX: ${HERMES_NAME_PREFIX-hermes-}
      HERMES_SKILLS_DIR: ${HERMES_SKILLS_DIR-/root/.claude/skills}
      HERMES_TASK_HANDLER: ${HERMES_TASK_HANDLER-/hermes/run-task.sh}
      HERMES_TIMEZONE: ${HERMES_TIMEZONE-Asia/Shanghai}
      HERMES_AGENT_ROOT: ${HERMES_AGENT_ROOT-/root/hermes}
      HERMES_AGENT_IMAGE: ${HERMES_AGENT_IMAGE-nousresearch/hermes-agent:latest}
      HERMES_CONTAINER_UID: ${HERMES_CONTAINER_UID-10000}
      HERMES_CONTAINER_GID: ${HERMES_CONTAINER_GID-10000}
    volumes:
      # 挂载宿主机 Docker socket，让后端能管理其他容器
      # 非 read-only：启停重启 / 创建 agent 需要写权限
      - /var/run/docker.sock:/var/run/docker.sock
      # 阶段 8 需要：后端要在宿主机 HERMES_AGENT_ROOT 下创建 agent 目录 + 写 .env
      - ${HERMES_AGENT_ROOT:-/root/hermes}:${HERMES_AGENT_ROOT:-/root/hermes}
